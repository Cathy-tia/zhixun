<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link icon="favicon.ico" type="image/x-icon" href="zhiuxnlogo.png">
    <title>智寻 - 选择界面</title>
    <style>
        /* 选择界面特定样式 */
        .selection-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .welcome-section {
            margin-bottom: 40px;
        }

        .welcome-section h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .welcome-section p {
            color: #8e8e98;
            font-size: 16px;
            margin-bottom: 0;
        }

        .user-info-card {
            background-color: #f8f9fc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .user-avatar-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details-small h3 {
            margin: 0 0 5px;
            font-size: 16px;
            color: #1a1a1a;
        }

        .user-details-small p {
            margin: 0;
            color: #8e8e98;
            font-size: 14px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .selection-card {
            background-color: #ffffff;
            border: 2px solid #f0f0f5;
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .selection-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(106, 27, 154, 0.1);
            border-color: #6A1B9A;
        }

        .selection-card.admin {
            border-color: #ff6b6b;
        }

        .selection-card.admin:hover {
            border-color: #ff5252;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.1);
        }

        .selection-card.student {
            border-color: #4ecdc4;
        }

        .selection-card.student:hover {
            border-color: #26a69a;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.1);
        }

        .selection-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: white;
        }

        .selection-icon.admin {
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
        }

        .selection-icon.student {
            background: linear-gradient(135deg, #4ecdc4, #26a69a);
        }

        .selection-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .selection-card p {
            color: #8e8e98;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 0;
        }

        .admin-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ff6b6b;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .student-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #4ecdc4;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        /* 密码输入模态框 */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .password-modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .modal-content h3 {
            margin: 0 0 20px;
            color: #1a1a1a;
            font-size: 20px;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f5;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .password-input:focus {
            outline: none;
            border-color: #6A1B9A;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .confirm-btn {
            background-color: #6A1B9A;
            color: white;
        }

        .confirm-btn:hover {
            background-color: #50157a;
        }

        .cancel-btn {
            background-color: #f8f9fc;
            color: #8e8e98;
        }

        .cancel-btn:hover {
            background-color: #e9e9ed;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-link {
            color: #6A1B9A;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="selection-container">
        <!-- 欢迎信息 -->
        <div class="welcome-section">
            <h1>欢迎使用智寻系统</h1>
            <p>请选择您的身份进入相应界面</p>
        </div>

        <!-- 用户信息 -->
        <div class="user-info-card">
            <img id="userAvatar" class="user-avatar-small" src="" alt="用户头像">
            <div class="user-details-small">
                <h3 id="userName">用户</h3>
                <p id="userType">微信用户</p>
            </div>
        </div>

        <!-- 选择网格 -->
        <div class="selection-grid">
            <div class="selection-card admin" onclick="showPasswordModal()">
                <div class="admin-badge">需要密码</div>
                <div class="selection-icon admin">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h3>管理员界面</h3>
                <p>管理系统设置、失物信息管理、数据统计等高级功能</p>
            </div>

            <div class="selection-card student" onclick="enterStudentInterface()">
                <div class="student-badge">直接进入</div>
                <div class="selection-icon student">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h3>学生界面</h3>
                <p>发布失物信息、查找失物、查看历史记录等基本功能</p>
            </div>
        </div>

        <!-- 个人信息管理 -->
        <div class="profile-management">
            <a href="profile.html" class="profile-link">
                <i class="fas fa-user-cog"></i>
                管理个人信息
            </a>
        </div>

        <!-- 返回登录 -->
        <div class="back-to-login">
            <a href="login.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                返回登录页面
            </a>
        </div>
    </div>

    <!-- 密码输入模态框 -->
    <div id="passwordModal" class="password-modal">
        <div class="modal-content">
            <h3>管理员身份验证</h3>
            <input type="password" id="adminPassword" class="password-input" placeholder="请输入管理员密码" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="hidePasswordModal()">取消</button>
                <button class="modal-btn confirm-btn" onclick="verifyAdminPassword()">确认</button>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时显示用户信息
        document.addEventListener('DOMContentLoaded', function() {
            displayUserInfo();
            checkLoginStatus();
        });

        // 显示用户信息
        function displayUserInfo() {
            const userData = JSON.parse(localStorage.getItem('current_user') || '{}');
            const loginType = localStorage.getItem('login_type') || 'unknown';
            const schoolInfo = JSON.parse(localStorage.getItem('school_info') || '{}');
            
            if (userData.avatar) {
                document.getElementById('userAvatar').src = userData.avatar;
            }
            
            document.getElementById('userName').textContent = userData.nickname || '用户';
            
            // 显示用户类型和学校信息
            const userTypeElement = document.getElementById('userType');
            let userTypeText = '';
            
            if (loginType === 'wechat') {
                userTypeText = '微信用户';
            } else if (loginType === 'phone') {
                userTypeText = '手机用户';
                if (userData.phone) {
                    userTypeText = '手机用户 ' + userData.phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1****$3');
                }
            }
            
            // 添加学校信息
            if (schoolInfo.schoolName) {
                userTypeText += ' · ' + schoolInfo.schoolName;
            } else if (localStorage.getItem('school_info_skipped')) {
                userTypeText += ' · 未填写学校信息';
            } else {
                userTypeText += ' · 请完善学校信息';
            }
            
            userTypeElement.textContent = userTypeText;
        }

        // 检查登录状态
        function checkLoginStatus() {
            const currentUser = localStorage.getItem('current_user');
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
        }

        // 显示密码输入模态框
        function showPasswordModal() {
            const modal = document.getElementById('passwordModal');
            modal.classList.add('active');
            document.getElementById('adminPassword').focus();
        }

        // 隐藏密码输入模态框
        function hidePasswordModal() {
            const modal = document.getElementById('passwordModal');
            modal.classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        // 验证管理员密码
        function verifyAdminPassword() {
            const password = document.getElementById('adminPassword').value.trim();
            
            // 默认管理员密码（实际项目中应该从后端获取）
            const adminPassword = 'admin123'; // 可以修改为您的密码
            
            if (!password) {
                showMessage('请输入管理员密码', 'error');
                return;
            }
            
            if (password === adminPassword) {
                // 设置管理员验证状态
                sessionStorage.setItem('admin_verified', 'true');
                showMessage('密码验证成功！', 'success');
                setTimeout(() => {
                    // 跳转到管理员界面
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showMessage('密码错误，请重新输入', 'error');
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }

        // 进入学生界面
        function enterStudentInterface() {
            showMessage('正在进入学生界面...', 'info');
            setTimeout(() => {
                // 跳转到学生界面（这里使用现有的main.html作为学生界面）
                window.location.href = 'main.html';
            }, 500);
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            // 移除现有的消息
            const existingMsg = document.querySelector('.message-toast');
            if (existingMsg) {
                existingMsg.remove();
            }

            const toast = document.createElement('div');
            toast.className = `message-toast message-${type}`;
            
            // 根据类型添加图标
            const icon = getMessageIcon(type);
            toast.innerHTML = `${icon}<span>${message}</span>`;
            
            document.body.appendChild(toast);
            
            // 3秒后自动消失
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        // 获取消息图标
        function getMessageIcon(type) {
            const icons = {
                success: '<i class="fas fa-check-circle"></i>',
                error: '<i class="fas fa-exclamation-triangle"></i>',
                warning: '<i class="fas fa-exclamation-circle"></i>',
                info: '<i class="fas fa-info-circle"></i>'
            };
            return icons[type] || icons.info;
        }

        // 回车键支持
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAdminPassword();
            }
        });

        // 点击模态框背景关闭
        document.getElementById('passwordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hidePasswordModal();
            }
        });
    </script>
</body>
</html>
