<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<title>登记拾到物品</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:#f8f4ff;
font-family:Arial, Helvetica, sans-serif;
}

.container{
max-width:800px;
margin:auto;
padding:30px;
}

/* 头部 */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
border-bottom:1px solid #eee;
padding-bottom:15px;
}

.page-header h1{
color:#6A1B9A;
font-size:28px;
}

/* 返回按钮 */

.back-btn{
background:#f3e8ff;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:#6A1B9A;
}

.back-btn:hover{
background:#6A1B9A;
color:white;
}

/* 表单 */

.form-box{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 4px 15px rgba(106,27,154,0.1);
}

label{
display:block;
margin-top:15px;
font-weight:600;
color:#555;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:2px solid #eee;
background:#f8f4ff;
}

input:focus,textarea:focus{
outline:none;
border-color:#6A1B9A;
background:white;
}

/* 摄像头 */

.video-box{
margin-top:20px;
text-align:center;
}

video,img{
width:100%;
border-radius:12px;
margin-top:10px;
}

/* 按钮 */

.btn{
margin-top:15px;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:16px;
}

.photo-btn{
background:#8E24AA;
color:white;
}

.photo-btn:hover{
background:#6A1B9A;
}

.submit-btn{
background:linear-gradient(135deg,#6A1B9A,#8E24AA);
color:white;
}

.submit-btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<div class="page-header">

<h1>
<i class="fas fa-hand-holding-heart"></i>
拾到物品登记
</h1>

<button class="back-btn"
onclick="window.location.href='main.html'">

<i class="fas fa-arrow-left"></i>
返回主页

</button>

</div>


<div class="form-box">

<label>物品名称</label>
<input id="itemName" placeholder="例如：黑色钱包">


<label>拾到地点</label>
<input id="location" placeholder="例如：图书馆三楼自习室">


<label>拾到时间</label>
<input type="datetime-local" id="foundTime">


<label>详细描述</label>
<textarea id="description" rows="4"></textarea>


<div class="video-box">

<h3>拍摄物品照片</h3>

<video id="video" autoplay></video>

<button class="btn photo-btn" onclick="takePhoto()">

<i class="fas fa-camera"></i>
拍照

</button>

<canvas id="canvas" style="display:none"></canvas>

<img id="preview">

</div>


<button class="btn submit-btn" onclick="submitItem()">

<i class="fas fa-upload"></i>
提交登记

</button>

</div>

</div>

<script src="found.js"></script>

</body>
<script>const video = document.getElementById("video");

    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
    video.srcObject = stream;
    })
    .catch(()=>{
    alert("摄像头无法打开");
    });
    
    let photoData="";
    
    function takePhoto(){
    
    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");
    
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    
    ctx.drawImage(video,0,0);
    
    photoData=canvas.toDataURL("image/png");
    
    document.getElementById("preview").src=photoData;
    
    }
    
    function submitItem(){
    
    const name=document.getElementById("itemName").value;
    const location=document.getElementById("location").value;
    const time=document.getElementById("foundTime").value;
    const description=document.getElementById("description").value;
    
    if(!name||!location||!time){
    
    alert("请填写完整信息");
    
    return;
    
    }
    
    let items=JSON.parse(localStorage.getItem("lost_items")||"[]");
    
    const user=JSON.parse(localStorage.getItem("current_user")||"{}");
    
    const newItem={
    
    id:Date.now(),
    
    name:name,
    
    image:photoData,
    
    location:location,
    
    foundTime:time,
    
    description:description,
    
    claimed:false,
    
    claimedBy:"",
    
    claimedTime:"",
    
    postedBy:user.nickname||"用户",
    
    contact:user.phone||"微信联系"
    
    };
    
    items.push(newItem);
    
    localStorage.setItem("lost_items",JSON.stringify(items));
    
    alert("登记成功！");
    
    window.location.href="xuanzhaoshiwu.html";
    
    }</script>
</html>
